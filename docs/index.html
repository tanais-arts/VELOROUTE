<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VÉLOROUTE">
  <meta name="theme-color" content="#08121c">
  <link rel="manifest" href="manifest.json">
  <title>VÉLOROUTE</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css?v=34">
</head>
<body>

  <div id="map"></div>

  <!-- ── PHOTO BAR ── -->
  <div id="photo-bar">
    <button class="carousel-arrow" id="carousel-prev">&#8249;</button>
    <div id="photo-carousel"></div>
    <button class="carousel-arrow" id="carousel-next">&#8249;</button>
  </div>

  <div id="voyage-filter-wrap">
    <select id="voyage-filter" title="Filtrer par voyage">
      <option value="">Tous les voyages</option>
    </select>
  </div>

  <!-- ── LIGHTBOX ── -->
  <div id="lightbox" hidden>
    <div id="lightbox-backdrop"></div>
    <button id="lightbox-close">✕</button>
    <div id="lightbox-img-wrap">
      <img id="lightbox-img" src="" alt="">
      <video id="lightbox-video" controls playsinline style="display:none" onclick="event.stopPropagation()"></video>
    </div>
    <div id="lb-toolbar">
      <button id="lightbox-prev">&#10094;</button>
      <span id="lb-counter" hidden></span>
      <button id="lb-download" title="Télécharger l'original">&#8681;</button>
      <button id="lightbox-next">&#10095;</button>
    </div>
    <div id="lb-progress"><div id="lb-progress-bar"></div></div>
  </div>

  <!-- ── INFO BAS ── -->
  <div id="photo-info">
    <div id="date-loc"></div>
    <div id="photo-info-date">
      <span id="date-day"></span>&thinsp;<span id="date-month"></span><span id="date-time"></span>
    </div>
  </div>

  <!-- ── SCRUBBER CAROUSEL ── -->
  <div id="scrubber-wrap">
    <input id="carousel-scrubber" type="range" min="0" max="1" step="1" value="0" autocomplete="off">
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.js"></script>
  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
  <script src="app.js?v=21"></script>
</body>
</html>
