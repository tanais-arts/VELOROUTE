  <line x1="5" y1="16" x2="27" y2="16" stroke="#14305a" stroke-width="0.5"/>
  <line x1="7" y1="11" x2="25" y2="11" stroke="#14305a" stroke-width="0.4"/>
  <line x1="7" y1="21" x2="25" y2="21" stroke="#14305a" stroke-width="0.4"/>
  <!-- continents (simplified) -->
